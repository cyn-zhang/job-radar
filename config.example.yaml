# ============================================================
# JobRadar — User Configuration
# Copy this file to config.yaml and fill in your details.
# Everything else (SKILL.md) stays untouched.
# ============================================================

hunter:
  # --- Personal ---
  name: "Your Name"
  email: "your.email@example.com"          # Gmail digest sent here

  # --- Alumni networking ---
  # Used by /job-network to discover where people from your school/program work.
  # Keep broad enough to catch adjacent degrees.
  university: "University of Melbourne"
  majors:
    - "Computer Science"
    - "Software Engineering"
    - "Information Technology"
  graduation_year: 2025

  # --- Career level ---
  # Options: intern | graduate | junior | mid | senior | lead | manager | director | vp | executive
  #   intern     → student / internship programs
  #   graduate   → grad programs, < 1 yr experience
  #   junior     → 1–3 yrs
  #   mid        → 3–6 yrs
  #   senior     → 6–10 yrs
  #   lead       → tech lead / principal
  #   manager    → engineering manager / senior manager
  #   director   → director / senior director
  #   vp         → VP of Engineering / VP Product
  #   executive  → CTO, CIO, CPO, CEO and other C-suite
  level: "intern"

  # --- Target roles ---
  # List any roles you want to search for.
  # The copilot will search all of these across all sources.
  roles:
    - "Software Engineer Intern"
    - "Data Engineer Intern"
    - "AI Engineer Intern"
    - "ML Engineer Intern"
    - "DevOps Intern"
    - "Security Engineer Intern"
    - "Product Engineer Intern"
    - "Product Design Intern"
    - "Graduate Developer"

  # --- Eligibility filter ---
  # Include roles where eligible majors mention any of these keywords.
  # Leave empty [] to skip eligibility filtering.
  eligible_majors:
    - "Computer Science"
    - "CS"
    - "Information Technology"
    - "Software Engineering"
    - "Engineering"

  # --- Locations ---
  locations:
    - "Melbourne"
    - "Sydney"
    - "Remote"

  # --- Industry focus ---
  # Based on Seek.com.au industry categories (Australian job market standard)
  #
  # tech          → ICT, Software Engineering, Data, AI, Cybersecurity
  # finance       → Banking, Insurance, Superannuation, Investment
  # accounting    → Accounting, Audit, Advisory (Big 4 / mid-tier firms)
  # consulting    → Management Consulting, Strategy, Business Advisory
  # healthcare    → Healthcare, Medical, Pharmaceutical, Aged Care
  # government    → Government, Defence, Public Sector, Policy
  # legal         → Legal, Compliance, Risk
  # education     → Education, Training, Research, Universities
  # energy        → Mining, Resources, Oil & Gas, Utilities, Renewables
  # retail        → Retail, Consumer Products, FMCG, E-commerce
  # marketing     → Marketing, Communications, Advertising, Media, PR
  # hr            → Human Resources, Recruitment, People & Culture
  # construction  → Construction, Property, Real Estate, Architecture
  # manufacturing → Manufacturing, Transport, Logistics, Supply Chain
  # any           → no industry filter — search all sectors
  # List one or more industries to search across multiple sectors.
  industry:
    - "tech"
  # industry:
  #   - "tech"
  #   - "finance"

  # --- Work type filter ---
  # Options: internship | graduate | contract | permanent | any
  # Controls what role types are included in scans.
  work_type: "internship"

  # --- Job sources ---
  sources:
    seek: true
    linkedin: true
    gradconnection: true
    aus_internship_finder: true
    indeed: true
    company_sites: true

